pack_id: greentic.events.email
version: 0.1.0
kind: application
publisher: greentic
components:
- id: events-email-source
  version: 1.0.0
  world: greentic:events/source@1.0.0
  supports:
  - event
  profiles:
    default: stateless
    supported:
    - stateless
  capabilities:
    wasi:
      clocks: true
    host:
      secrets:
        required:
        - key: MSGRAPH_CLIENT_SECRET
          required: true
          description: Client secret for the configured Microsoft Graph app registration
          scope:
            env: "{{env}}"
            tenant: "{{tenant}}"
          format: text
        - key: GMAIL_CLIENT_SECRET
          required: true
          description: Client secret for the configured Google Workspace project
          scope:
            env: "{{env}}"
            tenant: "{{tenant}}"
          format: text
        - key: GMAIL_REFRESH_TOKEN
          required: true
          description: Refresh token for the service account or delegated Gmail user
          scope:
            env: "{{env}}"
            tenant: "{{tenant}}"
          format: text
      events:
        inbound: false
        outbound: true
  wasm: components/stubs/events-email-source.wasm
- id: events-email-sink
  version: 1.0.0
  world: greentic:events/sink@1.0.0
  supports:
  - event
  profiles:
    default: stateless
    supported:
    - stateless
  capabilities:
    wasi:
      random: false
      clocks: true
    host:
      secrets:
        required:
        - key: MSGRAPH_CLIENT_SECRET
          required: true
          description: Client secret for the configured Microsoft Graph app registration
          scope:
            env: '{{env}}'
            tenant: '{{tenant}}'
          format: text
        - key: GMAIL_CLIENT_SECRET
          required: true
          description: Client secret for the configured Google Workspace project
          scope:
            env: '{{env}}'
            tenant: '{{tenant}}'
          format: text
        - key: GMAIL_REFRESH_TOKEN
          required: true
          description: Refresh token for the service account or delegated Gmail user
          scope:
            env: '{{env}}'
            tenant: '{{tenant}}'
          format: text
      events:
        inbound: true
        outbound: false
      http:
        client: true
        server: false
  wasm: components/stubs/events-email-sink.wasm
- id: events-provider-dummy
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host: {}
  wasm: components/events-provider-dummy.wasm
- id: events-provider-email
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host: {}
  wasm: components/events-provider-email.wasm
- id: events-provider-sms
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host: {}
  wasm: components/events-provider-sms.wasm
- id: events-provider-timer
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host: {}
  wasm: components/events-provider-timer.wasm
- id: events-provider-webhook
  version: 0.1.0
  world: root:component/root
  supports:
  - messaging
  profiles:
    default: default
    supported:
    - default
  capabilities:
    wasi:
      random: false
      clocks: false
    host: {}
  wasm: components/events-provider-webhook.wasm
- id: templating.handlebars
  version: 0.1.0
  world: greentic:flow/templating@1.0.0
  supports:
  - messaging
  profiles:
    default: stateless
    supported:
    - stateless
  capabilities:
    wasi:
      filesystem:
        mode: none
        mounts: []
      random: true
      clocks: true
    host:
      secrets:
        required: []
      messaging:
        inbound: false
        outbound: false
      telemetry:
        scope: node
  wasm: components/templating.handlebars/stub.wasm
dependencies: []
events:
  providers:
    - name: "email-in-msgraph"
      kind: "source"
      component: "events-email-source@1.0.0"
      capabilities:
        transport: "msgraph"
        reliability: "at_least_once"
        topics:
          - "email.in.msgraph.*"
    - name: "email-out-msgraph"
      kind: "sink"
      component: "events-email-sink@1.0.0"
      capabilities:
        transport: "msgraph"
        reliability: "at_least_once"
        topics:
          - "email.out.msgraph"
    - name: "email-in-gmail"
      kind: "source"
      component: "events-email-source@1.0.0"
      capabilities:
        transport: "gmail"
        reliability: "at_least_once"
        topics:
          - "email.in.gmail.*"
    - name: "email-out-gmail"
      kind: "sink"
      component: "events-email-sink@1.0.0"
      capabilities:
        transport: "gmail"
        reliability: "at_least_once"
        topics:
          - "email.out.gmail"
assets: []
extensions:
  greentic.ext.capabilities.v1:
    kind: greentic.ext.capabilities.v1
    version: 0.4.12
    inline:
      schema_version: 1
      offers:
        - cap_id: greentic.cap.events.provider.v1
          offer_id: events-email-v1
          priority: 100
          provider:
            component_ref: events-provider-email
            op: events.configure
          requires_setup: false
          version: 0.4.12
