pack_id: greentic.events.timer
version: 0.1.0
kind: application
publisher: greentic
name: greentic.events.timer
description: Greentic timer/cron event providers
authors:
  - Greentic Engineering <engineering@greentic.dev>
license: MIT
components:
  - id: events-timer-source
    version: 1.0.0
    world: greentic:events/source@1.0.0
    supports:
      - event
    profiles:
      default: stateless
      supported:
        - stateless
    capabilities:
      wasi:
        clocks: true
      host:
        events:
          inbound: false
          outbound: true
    wasm: components/stubs/events-timer-source.wasm
  - id: events-provider-timer
    version: 0.1.0
    world: greentic:provider/schema-core@1.0.0
    supports: []
    profiles:
      default: stateless
      supported:
        - stateless
    capabilities:
      wasi:
        random: false
        clocks: true
      host: {}
    wasm: components/events-provider-timer.wasm
  - id: templating.handlebars
    version: 0.1.0
    world: greentic:flow/templating@1.0.0
    supports:
      - messaging
    profiles:
      default: stateless
      supported:
        - stateless
    capabilities:
      wasi:
        clocks: true
        random: true
        filesystem:
          mode: none
          mounts: []
      host:
        messaging:
          inbound: false
          outbound: false
        secrets:
          required: []
        telemetry:
          scope: node
    wasm: components/templating.handlebars/stub.wasm
events:
  providers:
    - name: "timer-core"
      kind: "source"
      component: "events-timer-source@1.0.0"
      capabilities:
        transport: "timer"
        reliability: "at_least_once"
        ordering: "none"
        topics:
          - "timer.*"
extensions:
  greentic.ext.capabilities.v1:
    kind: greentic.ext.capabilities.v1
    version: 0.4.12
    inline:
      schema_version: 1
      offers:
        - cap_id: greentic.cap.events.provider.v1
          offer_id: events-timer-v1
          priority: 100
          provider:
            component_ref: events-provider-timer
            op: events.configure
          requires_setup: false
          version: 0.4.12
