provider_id: events-email-sendgrid
version: 1
title: Email (SendGrid) event provider setup
questions:
  - name: enabled
    title: Enable email provider
    kind: boolean
    required: false
    default: "true"
    help: "Enable or disable this event provider"
    group: General
  - name: messaging_provider_id
    title: Messaging provider ID
    kind: string
    required: true
    help: "ID of the messaging provider instance that handles email delivery (API credentials are configured in that provider)"
    placeholder: "messaging-email"
    group: Connection
  - name: from
    title: Default sender email
    kind: string
    required: false
    help: "Default sender email address for outgoing emails"
    placeholder: "noreply@example.com"
    group: Email
  - name: persistence_key_prefix
    title: Persistence key prefix
    kind: string
    required: false
    default: "events/email/sendgrid/queued"
    help: "State store key prefix for queued email requests"
    placeholder: "events/email/sendgrid/queued"
    group: Advanced
