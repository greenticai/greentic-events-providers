- id: templating.handlebars
  version: 0.1.0
  world: greentic:flow/templating@1.0.0
  supports:
  - messaging
  profiles:
    default: stateless
    supported:
    - stateless
  capabilities:
    wasi:
      filesystem:
        mode: none
        mounts: []
      random: true
      clocks: true
    host:
      secrets:
        required: []
      messaging:
        inbound: false
        outbound: false
      telemetry:
        scope: node
  wasm: components/templating.handlebars/stub.wasm
dependencies: []
assets: []
extensions:
  greentic.events.ingress-http.v1:
    kind: greentic.events.ingress-http.v1
    version: 1.0.0
    inline:
      handlers:
      - handler_id: webhook-default
        method: POST
        op_id: ingest_http
        path: /v1/events/ingress/webhook/{tenant}/{team}/{handler}
  greentic.ext.capabilities.v1:
    kind: greentic.ext.capabilities.v1
    version: 0.4.12
    inline:
      offers:
      - cap_id: greentic.cap.events.provider.v1
        offer_id: events-webhook-v1
        priority: 100
        provider:
          component_ref: events-provider-webhook
          op: events.configure
        requires_setup: false
        version: 0.4.12
      schema_version: 1
  greentic.provider-extension.v1:
    kind: greentic.provider-extension.v1
    version: 0.1.0
    inline:
      providers:
      - provider_type: events.webhook
        capabilities:
        - http
        - events
        ops:
        - ingest_http
        - publish
        config_schema_ref: schemas/events/webhook/config.schema.json
        runtime:
          component_ref: events-provider-webhook
          export: schema-core-api
          world: greentic:provider/schema-core@1.0.0
