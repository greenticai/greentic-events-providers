provider_id: events-webhook
version: 1
title: Webhook event provider setup
questions:
  - name: enabled
    title: Enable webhook provider
    kind: boolean
    required: false
    default: "true"
    help: "Enable or disable this event provider"
    group: General
  - name: target_url
    title: Target URL
    kind: string
    required: false
    help: "Optional outbound webhook URL for forwarding published events (must be valid HTTP/HTTPS URL)"
    placeholder: "https://example.com/webhook"
    group: Connection
    validate:
      regex: "^https?://"
  - name: method
    title: HTTP method
    kind: string
    required: false
    default: "POST"
    help: "HTTP method to use for webhook requests"
    placeholder: "POST"
    group: Connection
  - name: auth_token
    title: Auth token
    kind: string
    required: false
    secret: true
    help: "Bearer token for webhook authentication (optional)"
    placeholder: "paste-your-token-here"
    group: Authentication
  - name: timeout_ms
    title: Timeout (ms)
    kind: number
    required: false
    default: "5000"
    help: "Request timeout in milliseconds"
    placeholder: "5000"
    group: Connection
