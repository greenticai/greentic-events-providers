name: CI
permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: 1.95.0
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ env.RUSTUP_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - name: Install wasm32-wasip2 target
        run: rustup target add wasm32-wasip2 --toolchain "${RUSTUP_TOOLCHAIN}"
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Show toolchain/targets
        run: |
          rustup show active-toolchain
          rustup target list --toolchain "${RUSTUP_TOOLCHAIN}" --installed
      - name: Install latest greentic-pack
        run: cargo binstall greentic-pack --force --locked -y
      - name: Install latest greentic-flow
        run: cargo binstall greentic-flow --force --locked -y
      - name: Install cargo-component (required by greentic-component for component@0.6.0)
        run: cargo binstall cargo-component --force --locked -y
      - name: Install latest greentic-component (from source for $ref fix)
        run: cargo install --git https://github.com/greenticai/greentic-component --bin greentic-component --locked --force
      - name: Install greentic-provision (skip if cached)
        run: |
          if ! command -v greentic-provision >/dev/null 2>&1; then
            cargo binstall greentic-provision --force -y
          fi
      - name: Show Greentic tool versions
        run: |
          greentic-pack --version
          greentic-flow --version
          greentic-component --version
          greentic-provision --help | head -1 || true
      - name: Local check (fmt + clippy + test + packs)
        run: PACK_DEBUG=1 ci/local_check.sh

  live-tests:
    needs: unit
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_LIVE_TESTS == 'true' }}
    env:
      RUN_LIVE_TESTS: true
      RUN_LIVE_HTTP: ${{ vars.RUN_LIVE_HTTP }}
      MSGRAPH_CLIENT_ID: ${{ secrets.MSGRAPH_CLIENT_ID }}
      MSGRAPH_CLIENT_SECRET: ${{ secrets.MSGRAPH_CLIENT_SECRET }}
      MSGRAPH_TENANT_ID: ${{ secrets.MSGRAPH_TENANT_ID }}
      MSGRAPH_TEST_USER: ${{ secrets.MSGRAPH_TEST_USER }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_TEST_USER: ${{ secrets.GMAIL_TEST_USER }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
      TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0
      - name: Run live tests (skips internally if secrets missing)
        run: |
          features=""
          if [ "${RUN_LIVE_HTTP}" = "true" ]; then
            features="--features live-http"
          fi
          cargo test --workspace --tests ${features}
