name: CI
permissions:
  contents: read

on:
  workflow_call:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/pr-ci.yml@main
    with:
      variant: host
      # Repo canonical toolchain is the wasm variant (targets wasm32-wasip2).
      toolchain-variant: wasm
      # Scope clippy to native crates only — wasm components require
      # --target wasm32-wasip2 and are covered by nightly-pack-smoke.yml.
      clippy-args: "-p provider-common -p provider-core -p provider-webhook -p provider-email -p provider-sms -p provider-timer -p sbom-patch --all-targets -- -D warnings"
      # Scope test to native crates only (same reason).
      test-args: "-p provider-common -p provider-core -p provider-webhook -p provider-email -p provider-sms -p provider-timer -p sbom-patch"

  live-tests:
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_LIVE_TESTS == 'true' }}
    env:
      RUN_LIVE_TESTS: true
      RUN_LIVE_HTTP: ${{ vars.RUN_LIVE_HTTP }}
      MSGRAPH_CLIENT_ID: ${{ secrets.MSGRAPH_CLIENT_ID }}
      MSGRAPH_CLIENT_SECRET: ${{ secrets.MSGRAPH_CLIENT_SECRET }}
      MSGRAPH_TENANT_ID: ${{ secrets.MSGRAPH_TENANT_ID }}
      MSGRAPH_TEST_USER: ${{ secrets.MSGRAPH_TEST_USER }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_TEST_USER: ${{ secrets.GMAIL_TEST_USER }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
      TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0
      - name: Run live tests (skips internally if secrets missing)
        run: |
          features=""
          if [ "${RUN_LIVE_HTTP}" = "true" ]; then
            features="--features live-http"
          fi
          cargo test --workspace --tests ${features}
