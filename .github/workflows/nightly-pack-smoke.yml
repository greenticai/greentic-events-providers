# Nightly pack-build smoke test.
# Runs the full ci/local_check.sh (fmt + clippy + test + pack build + doctor +
# provision conformance). fmt/clippy/test are redundant with pr-ci.yml but
# local_check.sh has no skip flags so we run it whole.
#
# See plans/binary-bifurcation.md Phase A.7 for the gate + notify pattern.

name: Nightly Pack Smoke

on:
  schedule:
    # 03:54 UTC — inside the 03:00-03:59 UTC nightly window per A.7.2
    # (custom/heavy nightlies 03:35-03:59).
    - cron: "54 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-pack-smoke-${{ github.ref }}
  cancel-in-progress: false

env:
  RUSTUP_TOOLCHAIN: 1.95.0

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
    steps:
      - id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW: ${{ github.workflow }}
          HEAD_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          emit() {
            local should_run="$1"
            local reason="$2"
            echo "should-run=${should_run}" >> "${GITHUB_OUTPUT}"
            {
              echo "## Nightly gate"
              echo ""
              echo "- **Event:** \`${EVENT_NAME}\`"
              echo "- **Workflow:** \`${WORKFLOW}\`"
              echo "- **HEAD:** \`${HEAD_SHA}\`"
              echo "- **Decision:** \`${should_run}\` — ${reason}"
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "gate: should-run=${should_run} (${reason})"
          }

          if [ "${EVENT_NAME}" != "schedule" ]; then
            emit true "non-schedule event (${EVENT_NAME:-unknown}) always runs"
            exit 0
          fi

          last_sha=$(gh run list \
            --repo "${REPO}" \
            --workflow "${WORKFLOW}" \
            --status success \
            --event schedule \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""' 2>/dev/null || echo "")

          if [ -z "${last_sha}" ]; then
            emit true "no prior successful scheduled run — establishing baseline"
            exit 0
          fi

          if [ "${last_sha}" = "${HEAD_SHA}" ]; then
            emit false "unchanged since last successful scheduled run (${last_sha})"
            exit 0
          fi

          emit true "changed since last successful scheduled run (${last_sha} → ${HEAD_SHA})"

  pack-smoke:
    needs: gate
    if: needs.gate.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-${{ env.RUSTUP_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - name: Install wasm32-wasip2 target
        run: rustup target add wasm32-wasip2 --toolchain "${RUSTUP_TOOLCHAIN}"
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Show toolchain/targets
        run: |
          rustup show active-toolchain
          rustup target list --toolchain "${RUSTUP_TOOLCHAIN}" --installed
      - name: Install latest greentic-pack
        run: cargo binstall greentic-pack --force --locked -y
      - name: Install latest greentic-flow
        run: cargo binstall greentic-flow --force --locked -y
      - name: Install cargo-component (required by greentic-component for component@0.6.0)
        run: cargo binstall cargo-component --force --locked -y
      - name: Install latest greentic-component (from source for $ref fix)
        run: cargo install --git https://github.com/greenticai/greentic-component --bin greentic-component --locked --force
      - name: Install greentic-provision (skip if cached)
        run: |
          if ! command -v greentic-provision >/dev/null 2>&1; then
            cargo binstall greentic-provision --force -y
          fi
      - name: Show Greentic tool versions
        run: |
          greentic-pack --version
          greentic-flow --version
          greentic-component --version
          greentic-provision --help | head -1 || true
      - name: Local check (fmt + clippy + test + packs)
        run: PACK_DEBUG=1 ci/local_check.sh
